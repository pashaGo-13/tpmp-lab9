name: iOS Build

on:
  push:
    branches: [ "main", "development", "production" ]

jobs:
  build:
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGNING_ALLOWED=NO
