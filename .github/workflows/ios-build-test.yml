name: iOS Build and Test

on:
  push:
    branches: [ "main", "development", "production" ]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Run Unit Tests
        continue-on-error: false
        run: |
          xcodebuild test-without-building \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -only-testing:GPTravelTests \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Run UI Tests
        continue-on-error: false
        run: |
          xcodebuild test-without-building \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -only-testing:GPTravelUITests \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Build Project
        if: success()
        run: |
          xcodebuild build \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
