name: iOS Build and Test

on:
  push:
    branches: [ "main", "development", "production" ]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Unit Tests
        continue-on-error: false
        run: |
          xcodebuild test \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -only-testing:GPTravelTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE=""
      
      - name: Run UI Tests
        continue-on-error: false
        run: |
          xcodebuild test \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -only-testing:GPTravelUITests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE=""
      
      - name: Build Project (only if tests passed)
        if: success()
        run: |
          xcodebuild build \
            -project GPTravel.xcodeproj \
            -scheme GPTravel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
